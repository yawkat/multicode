name: Build multicode-remote

on:
  push:
  pull_request:

jobs:
  build-linux-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install cross
        run: cargo install cross

      - name: Build Linux assets
        run: |
          make PROFILE=release stage-remote-tui
          make PROFILE=release build-linux-bundle-remote

      - name: Stage Linux bundle inputs
        shell: bash
        run: |
          set -euo pipefail
          set -x
          stage_root="target/artifacts/linux"
          rm -rf "$stage_root"
          mkdir -p "$stage_root/target/multicode-remote"
          mkdir -p "$stage_root/target/x86_64-unknown-linux-gnu/release"
          cp -R target/multicode-remote/tui "$stage_root/target/multicode-remote/"
          cp target/x86_64-unknown-linux-gnu/release/multicode-remote "$stage_root/target/x86_64-unknown-linux-gnu/release/"
          cp config.toml "$stage_root/config.toml"

      - name: Upload Linux bundle inputs
        uses: actions/upload-artifact@v4
        with:
          name: multicode-remote-linux-assets
          path: target/artifacts/linux
          if-no-files-found: error

  build-macos-remote:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build macOS remote
        run: cargo build -p multicode-remote --target aarch64-apple-darwin --release

      - name: Stage macOS remote binary
        shell: bash
        run: |
          set -euo pipefail
          stage_root="target/artifacts/macos"
          rm -rf "$stage_root"
          mkdir -p "$stage_root/target/aarch64-apple-darwin/release"
          cp target/aarch64-apple-darwin/release/multicode-remote "$stage_root/target/aarch64-apple-darwin/release/"

      - name: Upload macOS remote binary
        uses: actions/upload-artifact@v4
        with:
          name: multicode-remote-macos-binary
          path: target/artifacts/macos
          if-no-files-found: error

  package-bundle:
    needs:
      - build-linux-assets
      - build-macos-remote
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download Linux bundle inputs
        uses: actions/download-artifact@v4
        with:
          name: multicode-remote-linux-assets
          path: target/downloads/linux

      - name: Download macOS remote binary
        uses: actions/download-artifact@v4
        with:
          name: multicode-remote-macos-binary
          path: target/downloads/macos

      - name: Restore staged bundle inputs
        shell: bash
        run: |
          set -euo pipefail
          set -x
          echo "Linux artifact tree:"
          find target/downloads/linux -maxdepth 5 -print | sort
          echo "macOS artifact tree:"
          find target/downloads/macos -maxdepth 5 -print | sort
          echo "Copying config.toml from Linux assets"
          cp target/downloads/linux/config.toml config.toml
          echo "Copying staged TUI directory from Linux assets"
          mkdir -p target/multicode-remote
          cp -R target/downloads/linux/target/multicode-remote/tui target/multicode-remote/
          echo "Copying Linux multicode-remote binary"
          mkdir -p target/x86_64-unknown-linux-gnu/release
          cp target/downloads/linux/target/x86_64-unknown-linux-gnu/release/multicode-remote target/x86_64-unknown-linux-gnu/release/multicode-remote
          echo "Copying macOS multicode-remote binary"
          mkdir -p target/aarch64-apple-darwin/release
          cp target/downloads/macos/target/aarch64-apple-darwin/release/multicode-remote target/aarch64-apple-darwin/release/multicode-remote
          echo "Restoring executable bits on restored binaries"
          chmod +x target/x86_64-unknown-linux-gnu/release/multicode-remote
          chmod +x target/aarch64-apple-darwin/release/multicode-remote
          chmod +x target/multicode-remote/tui/x86_64-unknown-linux-gnu-multicode-tui
          chmod +x target/multicode-remote/tui/aarch64-unknown-linux-gnu-multicode-tui
          echo "Verifying restored config.toml"
          test -f config.toml
          echo "Verifying restored Linux multicode-remote binary"
          test -x target/x86_64-unknown-linux-gnu/release/multicode-remote
          echo "Verifying restored macOS multicode-remote binary"
          test -x target/aarch64-apple-darwin/release/multicode-remote
          echo "Verifying restored x86_64 Linux TUI binary"
          test -x target/multicode-remote/tui/x86_64-unknown-linux-gnu-multicode-tui
          echo "Verifying restored aarch64 Linux TUI binary"
          test -x target/multicode-remote/tui/aarch64-unknown-linux-gnu-multicode-tui

      - name: Build bundle zip
        run: make PROFILE=release bundle-zip

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: multicode-remote-bundle
          path: target/package/multicode-remote-bundle.zip
          if-no-files-found: error
